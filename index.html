<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Quiz Estereotipias</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  text-align: center;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 15px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.correct { background: green; }
.wrong { background: red; }
</style>
</head>

<body>
<div class="container">
  <h1>🎮 Super Quiz: Estereotipias</h1>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <h3 id="score"></h3>
</div>

<script>
const quiz = [

  // PRIMER QUIZ (5)
  {
    question: "¿Cuál es la verdad sobre las estereotipias en niños?",
    answers: [
      {text: "Siempre indican un trastorno", correct: false},
      {text: "Solo aparecen en niños con autismo", correct: false},
      {text: "Muchos niños sanos las tienen y desaparecen solas", correct: true},
      {text: "Son peligrosas en todos los casos", correct: false}
    ]
  },
  {
    question: "¿Cuándo suelen aumentar las estereotipias?",
    answers: [
      {text: "Solo cuando el niño duerme", correct: false},
      {text: "Con estrés, aburrimiento o emoción", correct: true},
      {text: "Únicamente cuando están enfermos", correct: false},
      {text: "Solo en la escuela", correct: false}
    ]
  },
  {
    question: "¿Qué diferencia hay entre estereotipias y tics?",
    answers: [
      {text: "Son exactamente lo mismo", correct: false},
      {text: "Los tics empiezan antes de los 3 años", correct: false},
      {text: "Las estereotipias son rítmicas y empiezan temprano", correct: true},
      {text: "Los tics no cambian nunca", correct: false}
    ]
  },
  {
    question: "¿Qué animales pueden mostrar comportamientos similares por estrés?",
    answers: [
      {text: "Solo perros", correct: false},
      {text: "Solo monos", correct: false},
      {text: "Osos, loros o tigres en zoológicos", correct: true},
      {text: "Ninguno", correct: false}
    ]
  },
  {
    question: "¿Cuál es una afirmación correcta sobre el aleteo?",
    answers: [
      {text: "Siempre significa autismo", correct: false},
      {text: "Nunca aparece en niños sanos", correct: false},
      {text: "Puede aparecer sin autismo", correct: true},
      {text: "Es exclusivo de adultos", correct: false}
    ]
  },

  // SEGUNDO QUIZ (10)
  {
    question: "¿Qué caracteriza a esta categoría de estereotipias?",
    answers: [
      {text: "No causan ningún daño", correct: false},
      {text: "Generan daño corporal autoinducido", correct: true},
      {text: "Solo afectan emociones", correct: false},
      {text: "Son imaginarias", correct: false}
    ]
  },
  {
    question: "¿Cuándo se considera grave este comportamiento?",
    answers: [
      {text: "Cuando es divertido", correct: false},
      {text: "Cuando causa lesiones significativas o riesgo de ellas", correct: true},
      {text: "Solo si dura mucho tiempo", correct: false},
      {text: "Cuando ocurre en público", correct: false}
    ]
  },
  {
    question: "¿Cuál es un ejemplo de autolesión?",
    answers: [
      {text: "Aplaudir", correct: false},
      {text: "Saltar", correct: false},
      {text: "Golpearse la cabeza contra la pared", correct: true},
      {text: "Reírse", correct: false}
    ]
  },
  {
    question: "¿Cuál de estos también es un comportamiento autolesivo?",
    answers: [
      {text: "Cantar", correct: false},
      {text: "Morderse manos o labios", correct: true},
      {text: "Leer", correct: false},
      {text: "Dormir", correct: false}
    ]
  },
  {
    question: "¿Qué puede pasar si no se trata este comportamiento?",
    answers: [
      {text: "Desaparece siempre solo", correct: false},
      {text: "Puede causar lesiones graves", correct: true},
      {text: "Mejora automáticamente", correct: false},
      {text: "No pasa nada", correct: false}
    ]
  },
  {
    question: "¿Cuál es una señal visible de este problema?",
    answers: [
      {text: "Alegría constante", correct: false},
      {text: "Moretones o heridas en el cuerpo", correct: true},
      {text: "Hambre", correct: false},
      {text: "Sueño", correct: false}
    ]
  },
  {
    question: "¿Qué puede necesitar una persona con este comportamiento?",
    answers: [
      {text: "Ignorarlo", correct: false},
      {text: "Supervisión constante", correct: true},
      {text: "Más tareas", correct: false},
      {text: "Castigos", correct: false}
    ]
  },
  {
    question: "¿Cuándo suelen aumentar estos comportamientos?",
    answers: [
      {text: "En vacaciones", correct: false},
      {text: "En momentos de estrés o frustración", correct: true},
      {text: "Cuando llueve", correct: false},
      {text: "Al dormir", correct: false}
    ]
  },
  {
    question: "¿En qué personas es más frecuente?",
    answers: [
      {text: "Solo adultos mayores", correct: false},
      {text: "Personas con TEA o discapacidad intelectual", correct: true},
      {text: "Solo deportistas", correct: false},
      {text: "Solo estudiantes", correct: false}
    ]
  },
  {
    question: "¿Cuál de estos también es un ejemplo?",
    answers: [
      {text: "Escribir", correct: false},
      {text: "Rascarse hasta hacerse heridas", correct: true},
      {text: "Dibujar", correct: false},
      {text: "Hablar", correct: false}
    ]
  }

];

let currentQuestion = 0;
let score = 0;

function showQuestion() {
  const q = quiz[currentQuestion];
  document.getElementById("question").innerText = q.question;
  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.answers.forEach(answer => {
    const btn = document.createElement("button");
    btn.innerText = answer.text;
    btn.onclick = () => selectAnswer(answer.correct, btn);
    answersDiv.appendChild(btn);
  });
}

function selectAnswer(correct, btn) {
  if (correct) {
    btn.classList.add("correct");
    score++;
  } else {
    btn.classList.add("wrong");
  }

  setTimeout(() => {
    currentQuestion++;
    if (currentQuestion < quiz.length) {
      showQuestion();
    } else {
      showScore();
    }
  }, 800);
}

function showScore() {
  document.getElementById("question").innerText = "🎉 ¡Juego terminado!";
  document.getElementById("answers").innerHTML = "";
  document.getElementById("score").innerText = "Puntaje: " + score + "/" + quiz.length;
}

showQuestion();
</script>
</body>
</html>
